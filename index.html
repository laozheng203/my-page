<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>视频管理中心</title>
  <style>
    :root {
      --primary: #0ea5e9;
      --bg-dark: #0c1222;
      --bg-card: #131b2e;
      --bg-input: #1a2342;
      --border: #2a3650;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, var(--bg-dark) 0%, #0f172a 100%);
      min-height: 100vh;
      color: var(--text);
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    h1 {
      font-size: clamp(24px, 5vw, 32px);
      margin-bottom: 8px;
    }

    .subtitle {
      color: var(--text-muted);
    }

    .upload-section {
      background: var(--bg-card);
      border-radius: 16px;
      padding: 32px;
      margin-bottom: 24px;
      border: 1px solid var(--border);
      text-align: center;
    }

    .upload-area {
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 40px 20px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .upload-area:hover {
      border-color: var(--primary);
      background: rgba(14, 165, 233, 0.05);
    }

    .upload-icon {
      font-size: 48px;
      margin-bottom: 12px;
    }

    .upload-text {
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .upload-hint {
      font-size: 13px;
      color: var(--text-muted);
    }

    #fileInput {
      display: none;
    }

    .video-list {
      display: grid;
      gap: 16px;
    }

    .video-item {
      background: var(--bg-card);
      border-radius: 12px;
      padding: 20px;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 16px;
      transition: all 0.3s;
    }

    .video-item:hover {
      border-color: var(--primary);
    }

    .video-icon {
      font-size: 32px;
      flex-shrink: 0;
    }

    .video-info {
      flex: 1;
      min-width: 0;
    }

    .video-name {
      font-weight: 500;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .video-name input {
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 12px;
      color: var(--text);
      font-size: 14px;
      flex: 1;
    }

    .video-name input:focus {
      outline: none;
      border-color: var(--primary);
    }

    .video-meta {
      font-size: 13px;
      color: var(--text-muted);
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    .video-actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .btn {
      padding: 10px 16px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.3s;
    }

    .btn-play {
      background: var(--primary);
      color: white;
    }

    .btn-play:hover {
      background: #0284c7;
    }

    .btn-delete {
      background: #ef4444;
      color: white;
    }

    .btn-delete:hover {
      background: #dc2626;
    }

    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .empty-icon {
      font-size: 64px;
      margin-bottom: 16px;
    }

    /* 视频播放弹窗 */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.9);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal.show {
      display: flex;
    }

    .modal-content {
      max-width: 90%;
      max-height: 90%;
    }

    .modal-content video {
      max-width: 100%;
      max-height: 85vh;
      border-radius: 8px;
    }

    .modal-close {
      position: absolute;
      top: 20px;
      right: 20px;
      background: rgba(255, 255, 255, 0.2);
      border: none;
      color: white;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 20px;
    }

    .modal-close:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    .count {
      text-align: center;
      color: var(--text-muted);
      margin-bottom: 20px;
    }

    @media (max-width: 600px) {
      .video-item {
        flex-direction: column;
        align-items: flex-start;
      }

      .video-actions {
        width: 100%;
      }

      .btn {
        flex: 1;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>📹 视频管理中心</h1>
      <p class="subtitle">本地存储 · 随时播放</p>
    </header>

    <div class="upload-section">
      <div class="upload-area" onclick="document.getElementById('fileInput').click()">
        <div class="upload-icon">📤</div>
        <div class="upload-text">点击上传视频文件</div>
        <div class="upload-hint">支持 MP4, MOV, AVI, WebM 格式</div>
      </div>
      <input type="file" id="fileInput" accept="video/*" multiple>
    </div>

    <div class="count" id="count">共 0 个视频</div>

    <div class="video-list" id="videoList"></div>
  </div>

  <!-- 播放弹窗 -->
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-content">
      <video id="modalVideo" controls></video>
    </div>
  </div>

  <script>
    const DB_NAME = 'VideoManager';
    const DB_VERSION = 1;
    const STORE_NAME = 'videos';
    let db;

    // 初始化IndexedDB
    function initDB() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, DB_VERSION);
        
        request.onerror = () => reject(request.error);
        
        request.onsuccess = () => {
          db = request.result;
          resolve(db);
        };
        
        request.onupgradeneeded = (e) => {
          const database = e.target.result;
          if (!database.objectStoreNames.contains(STORE_NAME)) {
            database.createObjectStore(STORE_NAME, { keyPath: 'id' });
          }
        };
      });
    }

    // 保存视频到IndexedDB
    async function saveVideo(file) {
      return new Promise((resolve, reject) => {
        const id = Date.now() + '-' + Math.random().toString(36).substr(2, 9);
        const video = {
          id,
          name: file.name.replace(/\.[^/.]+$/, ''),
          originalName: file.name,
          type: file.type.split('/')[1].toUpperCase() || 'VIDEO',
          size: file.size,
          uploadTime: new Date().toISOString(),
          data: file
        };

        const transaction = db.transaction([STORE_NAME], 'readwrite');
        const store = transaction.objectStore(STORE_NAME);
        const request = store.add(video);
        
        request.onsuccess = () => resolve(video);
        request.onerror = () => reject(request.error);
      });
    }

    // 获取所有视频
    async function getAllVideos() {
      return new Promise((resolve, reject) => {
        const transaction = db.transaction([STORE_NAME], 'readonly');
        const store = transaction.objectStore(STORE_NAME);
        const request = store.getAll();
        
        request.onsuccess = () => resolve(request.result || []);
        request.onerror = () => reject(request.error);
      });
    }

    // 删除视频
    async function deleteVideo(id) {
      return new Promise((resolve, reject) => {
        const transaction = db.transaction([STORE_NAME], 'readwrite');
        const store = transaction.objectStore(STORE_NAME);
        const request = store.delete(id);
        
        request.onsuccess = () => resolve();
        request.onerror = () => reject(request.error);
      });
    }

    // 更新视频名称
    async function updateVideoName(id, newName) {
      return new Promise((resolve, reject) => {
        const transaction = db.transaction([STORE_NAME], 'readwrite');
        const store = transaction.objectStore(STORE_NAME);
        const getRequest = store.get(id);
        
        getRequest.onsuccess = () => {
          const video = getRequest.result;
          video.name = newName;
          const putRequest = store.put(video);
          putRequest.onsuccess = () => resolve();
          putRequest.onerror = () => reject(putRequest.error);
        };
        
        getRequest.onerror = () => reject(getRequest.error);
      });
    }

    // 格式化文件大小
    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      if (bytes < 1024 * 1024 * 1024) return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
      return (bytes / (1024 * 1024 * 1024)).toFixed(2) + ' GB';
    }

    // 格式化日期
    function formatDate(isoString) {
      const date = new Date(isoString);
      return date.toLocaleDateString('zh-CN', {
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    // 渲染视频列表
    async function renderList() {
      const videos = await getAllVideos();
      const list = document.getElementById('videoList');
      const count = document.getElementById('count');
      
      count.textContent = `共 ${videos.length} 个视频`;
      
      if (videos.length === 0) {
        list.innerHTML = `
          <div class="empty">
            <div class="empty-icon">📁</div>
            <p>暂无视频，点击上方按钮上传</p>
          </div>
        `;
        return;
      }

      // 按上传时间倒序排列
      videos.sort((a, b) => new Date(b.uploadTime) - new Date(a.uploadTime));

      list.innerHTML = videos.map(video => `
        <div class="video-item" data-id="${video.id}">
          <div class="video-icon">🎬</div>
          <div class="video-info">
            <div class="video-name">
              <input type="text" value="${video.name}" onchange="renameVideo('${video.id}', this.value)">
            </div>
            <div class="video-meta">
              <span>📅 ${formatDate(video.uploadTime)}</span>
              <span>📦 ${video.type}</span>
              <span>💾 ${formatSize(video.size)}</span>
            </div>
          </div>
          <div class="video-actions">
            <button class="btn btn-play" onclick="playVideo('${video.id}')">▶ 播放</button>
            <button class="btn btn-delete" onclick="removeVideo('${video.id}')">🗑</button>
          </div>
        </div>
      `).join('');
    }

    // 重命名
    async function renameVideo(id, newName) {
      await updateVideoName(id, newName);
    }

    // 删除视频
    async function removeVideo(id) {
      if (confirm('确定要删除这个视频吗？')) {
        await deleteVideo(id);
        renderList();
      }
    }

    // 播放视频
    async function playVideo(id) {
      const videos = await getAllVideos();
      const video = videos.find(v => v.id === id);
      if (video && video.data) {
        const url = URL.createObjectURL(video.data);
        const modalVideo = document.getElementById('modalVideo');
        modalVideo.src = url;
        document.getElementById('modal').classList.add('show');
      }
    }

    // 关闭弹窗
    function closeModal() {
      document.getElementById('modal').classList.remove('show');
      document.getElementById('modalVideo').src = '';
    }

    // 点击弹窗外部关闭
    document.getElementById('modal').addEventListener('click', (e) => {
      if (e.target.id === 'modal') closeModal();
    });

    // 文件上传处理
    document.getElementById('fileInput').addEventListener('change', async (e) => {
      const files = Array.from(e.target.files);
      for (const file of files) {
        if (file.type.startsWith('video/')) {
          await saveVideo(file);
        }
      }
      renderList();
      e.target.value = '';
    });

    // 页面加载完成
    initDB().then(() => renderList());
  </script>
</body>
</html>
